   <!-- _layouts/default.html -->
   <!DOCTYPE html>
   <html lang="en">
   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>{{ page.title }}</title>
       <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
       <!-- Add any additional meta tags, scripts, or stylesheets here -->
   </head>
   <body>
       <header class="header">
           <div class="container">
               <h1 class="logo">Your Website Name</h1>
               <nav class="main-nav">
                   <ul>
                       <li><a href="/">Home</a></li>
                       <li><a href="/about">About</a></li>
                       <!-- Add more navigation links as needed -->
                   </ul>
               </nav>
           </div>
       </header>
       <main class="main-content">
           <div class="container">
               {{ content }}
           </div>
       </main>
       <footer class="footer">
           <div class="container">
               <p>&copy; {{ site.time | date: "%Y" }} Your Website Name</p>
           </div>
       </footer>
   </body>
   </html>
